name: Docker Build & Push

on:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Build server code
        working-directory: ./server
        run: npm run build

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client code
        working-directory: ./client
        run: npm run build

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [test-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        run: |
          docker build -t abuabddullah/sangam-server:latest \
                       -t abuabddullah/sangam-server:${{ github.sha }} \
                       ./server
          docker push abuabddullah/sangam-server:latest
          docker push abuabddullah/sangam-server:${{ github.sha }}

      - name: Build and push client image
        run: |
          docker build -t abuabddullah/sangam-client:latest \
                       -t abuabddullah/sangam-client:${{ github.sha }} \
                       ./client
          docker push abuabddullah/sangam-client:latest
          docker push abuabddullah/sangam-client:${{ github.sha }}

  update-k8s-manifests:
    runs-on: ubuntu-latest
    needs: [docker-build-push]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in deployment yamls
        run: |
          sed -i "s|abuabddullah/sangam-server:.*|abuabddullah/sangam-server:${{ github.sha }}|g" k8s/server-deployment.yaml
          sed -i "s|abuabddullah/sangam-client:.*|abuabddullah/sangam-client:${{ github.sha }}|g" k8s/client-deployment.yaml

      - name: Commit and push updated yamls
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/server-deployment.yaml k8s/client-deployment.yaml
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
