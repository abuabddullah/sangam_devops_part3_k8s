name: Docker Build & Push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Build server code
        working-directory: ./server
        run: npm run build

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client code
        working-directory: ./client
        run: npm run build

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push server image
        run: |
          docker build -t abuabddullah/sangam-server:latest \
                       -t abuabddullah/sangam-server:${{ github.sha }} \
                       ./server
          docker push abuabddullah/sangam-server:latest
          docker push abuabddullah/sangam-server:${{ github.sha }}

      - name: Build and push client image
        run: |
          docker build -t abuabddullah/sangam-client:latest \
                       -t abuabddullah/sangam-client:${{ github.sha }} \
                       ./client
          docker push abuabddullah/sangam-client:latest
          docker push abuabddullah/sangam-client:${{ github.sha }}
