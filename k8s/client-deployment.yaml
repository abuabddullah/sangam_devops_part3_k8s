apiVersion: apps/v1
kind: Deployment
metadata:
  name: sangam-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sangam-client
  template:
    metadata:
      labels:
        app: sangam-client
    spec:
      containers:
        - name: sangam-client
          image: abuabddullah/sangam-client:e1e64e0cb1ad77349cdd1e74d4d850d8d301fcfa
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
