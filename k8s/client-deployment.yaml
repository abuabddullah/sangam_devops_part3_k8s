apiVersion: apps/v1
kind: Deployment
metadata:
  name: sangam-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sangam-client
  template:
    metadata:
      labels:
        app: sangam-client
    spec:
      containers:
        - name: sangam-client
          image: abuabddullah/sangam-client:5bcc733f3c8ec02acdb1268b0ce4e9c9d4667ca8
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
